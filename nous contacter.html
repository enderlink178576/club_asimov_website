  <main>
    <h1>Nous contacter</h1>
      <!-- FORMULAIRE DE CONTACT -->
      <div class="contact-card">
        <form 
          id="contactForm"
          class="contact-form" 
          action="https://formsubmit.co/63f8c8b4e577d4a696068d3d0c684c6b" 
          method="POST"
        >
          <div class="row">
            <label>
              Nom
              <input type="text" name="name" placeholder="Nom" required />
            </label>
            <label>
              Email
              <input type="email" name="email" placeholder="Email" required />
            </label>
          </div>

          <label>
            Message
            <textarea name="message" placeholder="Message..." required></textarea>
          </label>

          <!-- OPTIONS FORMSUBMIT -->
          <input type="hidden" name="_subject" value="Nouveau message depuis mon site !">
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="https://theophileeeeeee.github.io/Website/merci.html">
          <input type="hidden" name="_error" value="https://theophileeeeeee.github.io/Website/erreur.html" />

          <div class="row" style="justify-content:flex-start;">
            <button type="submit" class="btn btn--grad">Envoyer</button>
            <button type="reset" class="btn">Effacer</button>
          </div>
        </form>
      </div>

  </main>
